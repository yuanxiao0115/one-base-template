<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">one-base-template Monorepo 架构总览</title>
  <desc id="desc">按应用层与共享层展示仓库目录结构，强调 admin 本地启动与 portal/template 的 app-starter 启动骨架。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .group { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 16; }
      .root { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2.5; rx: 14; }
      .apps { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; rx: 12; }
      .pkgs { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .title { font: 700 36px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .subtitle { font: 600 22px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #1e293b; }
      .text { font: 500 20px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .small { font: 500 18px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; }
      .hint { font: 600 19px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980" />
  <text class="title" x="56" y="64">Monorepo 架构总览（SVG）</text>

  <rect class="root" x="380" y="94" width="640" height="78" />
  <text class="subtitle" x="480" y="142">one-base-template（Monorepo）</text>

  <path class="line" d="M700 172 L700 210" />
  <path class="line" d="M700 210 L370 210" />
  <path class="line" d="M700 210 L1030 210" />
  <path class="line" d="M370 210 L370 246" />
  <path class="line" d="M1030 210 L1030 246" />

  <rect class="group" x="60" y="246" width="620" height="672" />
  <text class="subtitle" x="92" y="288">apps（应用层）</text>

  <rect class="apps" x="92" y="314" width="556" height="114" />
  <text class="text" x="118" y="360">admin</text>
  <text class="small" x="118" y="392">主后台组装层（本地 bootstrap 启动）</text>

  <rect class="apps" x="92" y="448" width="556" height="114" />
  <text class="text" x="118" y="494">portal</text>
  <text class="small" x="118" y="526">前台门户消费者（依赖 app-starter 启动骨架）</text>

  <rect class="apps" x="92" y="582" width="556" height="114" />
  <text class="text" x="118" y="628">template</text>
  <text class="small" x="118" y="660">最小静态菜单示例（依赖 app-starter 启动骨架）</text>

  <rect class="apps" x="92" y="716" width="556" height="114" />
  <text class="text" x="118" y="762">docs</text>
  <text class="small" x="118" y="794">VitePress 文档站</text>

  <rect class="group" x="720" y="246" width="620" height="672" />
  <text class="subtitle" x="752" y="288">packages（共享层）</text>

  <rect class="pkgs" x="752" y="314" width="556" height="76" />
  <text class="text" x="776" y="360">core：鉴权 / 菜单 / 主题 / HTTP 逻辑契约</text>

  <rect class="pkgs" x="752" y="402" width="556" height="76" />
  <text class="text" x="776" y="448">ui：Layout / Sidebar / Topbar / Tabs 壳层</text>

  <rect class="pkgs" x="752" y="490" width="556" height="76" />
  <text class="text" x="776" y="536">adapters：后端协议适配与字段映射</text>

  <rect class="pkgs" x="752" y="578" width="556" height="76" />
  <text class="text" x="776" y="624">portal-engine：门户编辑与渲染引擎</text>

  <rect class="pkgs" x="752" y="666" width="556" height="76" />
  <text class="text" x="776" y="712">app-starter：portal/template 启动编排与兜底</text>

  <rect class="pkgs" x="752" y="754" width="556" height="76" />
  <text class="text" x="776" y="800">tag / utils：标签与通用工具能力</text>

  <text class="hint" x="60" y="956">阅读顺序：先看目录分层，再看下方依赖关系表（Markdown 表格）定位每个应用该关注的共享包。</text>
</svg>
