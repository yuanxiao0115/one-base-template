<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 360" role="img" aria-labelledby="title desc">
  <title id="title">admin-lite 启动顺序流程图</title>
  <desc id="desc">展示 admin-lite 后台基座从 main 到 mount 的启动链路。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .start { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2.5; }
      .ok { fill: #ecfdf3; stroke: #22c55e; stroke-width: 2; }
      .title { font: 700 30px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .text { font: 600 18px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1760" height="360" />
  <text class="title" x="40" y="52">admin-lite 启动顺序（SVG）</text>

  <rect class="start" x="40" y="132" width="250" height="92" rx="12" />
  <text class="text" x="88" y="186">main.ts 启动 admin-lite</text>

  <rect class="node" x="330" y="132" width="290" height="92" rx="12" />
  <text class="text" x="374" y="186">bootstrap/startup.ts</text>

  <rect class="node" x="660" y="132" width="290" height="92" rx="12" />
  <text class="text" x="706" y="186">bootstrap/index.ts</text>

  <rect class="node" x="990" y="132" width="270" height="92" rx="12" />
  <text class="text" x="1015" y="186">router/assemble-routes.ts</text>

  <rect class="node" x="1300" y="132" width="280" height="92" rx="12" />
  <text class="text" x="1324" y="186">config/app.ts</text>

  <rect class="ok" x="1620" y="132" width="100" height="92" rx="12" />
  <text class="text" x="1644" y="186">mount</text>

  <path class="line" d="M290 178 L330 178" />
  <path class="line" d="M620 178 L660 178" />
  <path class="line" d="M950 178 L990 178" />
  <path class="line" d="M1260 178 L1300 178" />
  <path class="line" d="M1580 178 L1620 178" />
</svg>
