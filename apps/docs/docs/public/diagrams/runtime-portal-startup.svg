<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 360" role="img" aria-labelledby="title desc">
  <title id="title">portal 启动顺序流程图</title>
  <desc id="desc">展示 portal 从读取运行时配置到挂载应用的主要流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .start { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2.5; }
      .ok { fill: #ecfdf3; stroke: #22c55e; stroke-width: 2; }
      .title { font: 700 30px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .text { font: 600 18px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #0f172a; }
      .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1840" height="360" />
  <text class="title" x="40" y="52">portal 启动顺序（SVG）</text>

  <rect class="start" x="40" y="132" width="300" height="92" rx="12" />
  <text class="text" x="64" y="186">main.ts 读取 platform-config.json</text>

  <rect class="node" x="380" y="132" width="280" height="92" rx="12" />
  <text class="text" x="424" y="186">bootstrap/index.ts</text>

  <rect class="node" x="700" y="132" width="330" height="92" rx="12" />
  <text class="text" x="734" y="186">bootstrap/http.ts + adapter.ts</text>

  <rect class="node" x="1070" y="132" width="320" height="92" rx="12" />
  <text class="text" x="1102" y="186">useMaterials.ts 注入 cmsApi</text>

  <rect class="node" x="1430" y="132" width="220" height="92" rx="12" />
  <text class="text" x="1464" y="186">router.isReady()</text>

  <rect class="ok" x="1690" y="132" width="100" height="92" rx="12" />
  <text class="text" x="1714" y="186">mount</text>

  <path class="line" d="M340 178 L380 178" />
  <path class="line" d="M660 178 L700 178" />
  <path class="line" d="M1030 178 L1070 178" />
  <path class="line" d="M1390 178 L1430 178" />
  <path class="line" d="M1650 178 L1690 178" />
</svg>
